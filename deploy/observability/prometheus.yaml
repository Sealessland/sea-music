global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:9464"]

  - job_name: sea-music-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.containers.internal:8080"]
