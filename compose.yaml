name: sea-music

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sea_music}
      POSTGRES_USER: ${POSTGRES_USER:-sea_music}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-postgres-password}
    ports:
      - "${POSTGRES_PORT:-25432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:8.6.4-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-local-redis-password}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    ports:
      - "${REDIS_PORT:-26379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  object-store:
    image: chrislusf/seaweedfs:4.29
    command: ["mini", "-dir=/data"]
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-sea-music-local}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-local-object-store-password}
      S3_BUCKET: ${S3_BUCKET:-sea-music-media}
    ports:
      - "${S3_PORT:-28333}:8333"
      - "${SEAWEED_MASTER_PORT:-29333}:9333"
    volumes:
      - object-store-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9333/cluster/status"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  broker:
    image: apache/kafka:4.3.1
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:9092,EXTERNAL://localhost:${KAFKA_PORT:-29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "${KAFKA_PORT:-29092}:19092"
    volumes:
      - broker-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "127.0.0.1:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  rocketmq-nameserver:
    image: apache/rocketmq:5.3.2
    profiles: ["rocketmq"]
    command: ["sh", "mqnamesrv"]
    ports:
      - "${ROCKETMQ_NAMESERVER_PORT:-29876}:9876"
    volumes:
      - rocketmq-nameserver-logs:/home/rocketmq/logs
    healthcheck:
      test: ["CMD-SHELL", "sh mqadmin clusterList -n 127.0.0.1:9876 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    profiles: ["rocketmq"]
    command: ["sh", "mqbroker", "-n", "rocketmq-nameserver:9876", "--enable-proxy"]
    depends_on:
      rocketmq-nameserver:
        condition: service_healthy
    ports:
      - "${ROCKETMQ_PROXY_PORT:-28081}:8081"
    volumes:
      - rocketmq-broker-logs:/home/rocketmq/logs
      - rocketmq-broker-store:/home/rocketmq/store
    healthcheck:
      test: ["CMD-SHELL", "sh mqadmin clusterList -n rocketmq-nameserver:9876 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  rocketmq-init:
    image: apache/rocketmq:5.3.2
    profiles: ["rocketmq"]
    depends_on:
      rocketmq-broker:
        condition: service_healthy
    command:
      - sh
      - -c
      - >-
        sh mqadmin updateTopic -n rocketmq-nameserver:9876 -c DefaultCluster -t domain-events
        && sh mqadmin updateTopic -n rocketmq-nameserver:9876 -c DefaultCluster -t domain-events.dlq
    restart: "no"

  tempo:
    image: grafana/tempo:2.10.5
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./deploy/observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "${TEMPO_PORT:-33200}:3200"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    profiles: ["observability"]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      tempo:
        condition: service_started
    volumes:
      - ./deploy/observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-34317}:4317"
      - "${OTEL_HTTP_PORT:-34318}:4318"
      - "${OTEL_HEALTH_PORT:-33133}:13133"
      - "${OTEL_METRICS_PORT:-39464}:9464"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.12.0
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      otel-collector:
        condition: service_started
    volumes:
      - ./deploy/observability/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-39090}:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/-/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.2
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-local-grafana-password}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_started
    volumes:
      - ./deploy/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./deploy/observability/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./deploy/observability/sea-music-dashboard.json:/var/lib/grafana/dashboards/sea-music.json:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-33000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  object-store-data:
  broker-data:
  rocketmq-nameserver-logs:
  rocketmq-broker-logs:
  rocketmq-broker-store:
  tempo-data:
  prometheus-data:
  grafana-data:
