name: Queue benchmark

on:
  pull_request:
    paths:
      - ".github/workflows/queue-benchmark.yml"
      - "cmd/**"
      - "internal/events/**"
      - "internal/platform/config/**"
      - "scripts/loadtest.sh"
      - "scripts/queue-benchmark.sh"
      - "compose.yaml"
      - "go.mod"
      - "go.sum"
  push:
    branches: [main]
    paths:
      - ".github/workflows/queue-benchmark.yml"
      - "cmd/**"
      - "internal/events/**"
      - "internal/platform/config/**"
      - "scripts/loadtest.sh"
      - "scripts/queue-benchmark.sh"
      - "compose.yaml"
      - "go.mod"
      - "go.sum"
  schedule:
    - cron: "31 3 * * 1"
  workflow_dispatch:

concurrency:
  group: queue-benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  queue-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      SEA_QUEUE_BENCH_RUN_ID: ci-${{ github.run_id }}-${{ github.run_attempt }}
      SEA_QUEUE_BENCH_REPEATS: "3"
      SEA_LOAD_REQUESTS: "500"
      SEA_LOAD_CONCURRENCY: "16"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install runtime tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg jq

      - name: Run Kafka and RocketMQ comparison
        id: benchmark
        continue-on-error: true
        run: ./scripts/queue-benchmark.sh

      - name: Publish queue benchmark summary
        if: always() && hashFiles(format('artifacts/queue-benchmarks/{0}/report.json', env.SEA_QUEUE_BENCH_RUN_ID)) != ''
        run: |
          report="artifacts/queue-benchmarks/$SEA_QUEUE_BENCH_RUN_ID/report.json"
          {
            echo '## Queue benchmark'
            echo
            echo '| Broker | Runs | Write RPS | P95 (ms) | P99 (ms) | Outbox recovery (ms) | Errors |'
            echo '|---|---:|---:|---:|---:|---:|---:|'
            jq -r '.variants | to_entries[] | "| `\(.key)` | \(.value.runs) | \(.value.throughput_rps) | \(.value.p95_ms) | \(.value.p99_ms) | \(.value.backlog_recovery_ms) | \(.value.errors) |"' "$report"
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Upload queue benchmark evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: queue-benchmark-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/queue-benchmarks/${{ env.SEA_QUEUE_BENCH_RUN_ID }}/
          if-no-files-found: error
          retention-days: 14

      - name: Fail unsuccessful comparison
        if: always()
        run: test "${{ steps.benchmark.outcome }}" = success
