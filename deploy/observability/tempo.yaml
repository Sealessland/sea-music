server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# TraceQL metrics queries against recent spans (for example, `| rate()`) are
# served by the metrics-generator's local-blocks processor in Tempo 2.x.
metrics_generator:
  storage:
    path: /var/tempo/generator/wal
  processor:
    local_blocks:
      filter_server_spans: false
      flush_to_storage: true

overrides:
  defaults:
    metrics_generator:
      processors:
        - local-blocks

usage_report:
  reporting_enabled: false
