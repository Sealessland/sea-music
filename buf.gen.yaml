version: v2
plugins:
  - local:
      - go
      - run
      - google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
    out: .
    opt:
      - module=github.com/sealessland/sea-music
  - local:
      - go
      - run
      - google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2
    out: .
    opt:
      - module=github.com/sealessland/sea-music
